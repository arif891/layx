<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Demo</title>

    <link rel="stylesheet" href="sheet.css">

    <link rel="stylesheet" href="/layx/main/base/variable.css">
    <link rel="stylesheet" href="/layx/main/base/base.css">
    <link rel="stylesheet" href="/layx/main/typography/typography.css">
    <link rel="stylesheet" href="/layx/components/button/button.css">

    <style>
      body {}

      sheet {
      
        .wrapper {
          background-color: rgb(238, 238, 238);
        }
      }
    </style>
  </head>

  <body>
    <button id="open">Open</button>

    <sheet id="sheet" scrollable>
      <div class="wrapper">
        <button id="close">Close</button>
        <h1>Test</h1>
        <h1>Test</h1>
        <h1>Test</h1>
      </div>
      </div>
    </sheet>

  </body>

  <script type="module">
    import {Sheet} from "./sheet.js";
    const sm = new Sheet();
      document.getElementById('close').addEventListener('click', () => {
          const sheet = document.getElementById('sheet');
          sm.close(sheet);
      });
      document.getElementById('open').addEventListener('click', () => {
          const sheet = document.getElementById('sheet');
          sm.open(sheet);
       });
  </script>

</html>
