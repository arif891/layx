<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <link rel="stylesheet" href="media.css">
        <link rel="stylesheet" href="media_ext.css">

        <link rel="stylesheet" href="/layx/main/base/variable.css">
        <link rel="stylesheet" href="/layx/main/base/scrollbar.css">
        <link rel="stylesheet" href="/layx/main/base/base.css">
        <link rel="stylesheet" href="/layx/main/typography/typography.css">
        <link rel="stylesheet" href="/layx/main/container/container.css">
       
        <style>
            body {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .wrapper {
                display: flex;
                flex-wrap: wrap;
                align-items: flex-end;
                gap: 1rem;
                padding-bottom: 1rem;
            }
        </style>
    </head>

    <body>
        <container class="demo__container">

            <h3>Demo Media</h3>

            <div class="wrapper">
            <audio src="/layx/assets/media/audio.mp3" controls controlslist="nodownload noplaybackrate"></audio>
            <audio src="/layx/assets/media/audio.mp3" controls controlslist="nodownload noplaybackrate" vertical></audio>
            <video src="/layx/assets/media/audio.mp3" controls controlslist="nodownload noplaybackrate" type="audio"
                style="width: 300px;">
                <track default label="English" srclang="en" src="/layx/assets/other/video.vtt"/>
            </video>
            <video class="poster" src="/layx/assets/media/audio.mp3" controls poster="/layx/assets/image/demo/1.webp"
                style="width: 350px;" controlslist="nodownload noplaybackrate" type="audio">
                <track default label="English" srclang="en" src="/layx/assets/other/video.vtt" />
            </video>
            <video class="fullscreen-cover" src="/layx/assets/media/video.mp4" controls style="width: 475px;"
                controlslist="nodownload noplaybackrate" fullscreen="cover">
                <track default label="English " srclang="en" src="/layx/assets/other/video.vtt" />
            </video>
            </div>

        </container>
    </body>

</html>
