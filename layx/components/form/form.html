<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <link rel="stylesheet" href="form.css">
        <link rel="stylesheet" href="form_ext.css">

        <link rel="stylesheet" href="/layx/main/base/variable.css">
        <link rel="stylesheet" href="/layx/main/base/base.css">
        <link rel="stylesheet" href="/layx/main/base/scrollbar.css">
        <link rel="stylesheet" href="/layx/main/typography/typography.css">
        <link rel="stylesheet" href="/layx/main/container/container.css">


        <style>
            form {
                padding: 0;
                padding-bottom: 1rem;
            }

            .demo__container {

                >div {
                    display: grid;
                    gap: .5rem;

                    @media (width > 500px) {
                        max-width: 450px;
                        margin-inline: auto;
                    }
                }
            }
        </style>
    </head>

    <body>

        <form action="">

            <container class="__container">
                <h4>Form Controls</h4>
            </container>
            <container class="demo__container">
                <div>
                    <h5>Text Fields</h5>

                    <input type="email" id="text" placeholder="Email">

                    <input type="password" name="" id="" placeholder="Password">

                    <input type="number" name="" id="" placeholder="Number">
                </div>

                <div>
                    <h5>Others Fields</h5>

                    <input type="file" name="" id="">

                    <input class="value" type="range" name="" id="" placeholder="">

                    <input type="color" name="" id="col">

                </div>

                <div>
                    <h5>Time and Date</h5>

                    <input type="time" name="" id="">

                    <input type="date" name="" id="">

                    <input type="week" name="" id="">

                    <input type="month" name="" id="">
                </div>


                <div>

                    <h5>Checkbox and Radio</h5>

                    <input type="checkbox" name="" id="" style="margin-bottom: 1rem;">

                    <input type="checkbox" name="" id="" style="margin-bottom: 1rem;" switch>

                    <input type="radio" name="" id="" style="display: block; margin-bottom: 1rem;">

                    <lselect>
                        <input type="checkbox" name="" id="checkbox">
                        <label for="checkbox" tabindex="0">Checkbox</label>
                    </lselect>

                    <lselect>
                        <input class="modern" type="radio" name="" id="radio">
                        <label for="radio" tabindex="0">Radio</label>
                    </lselect>

                </div>

                <div>
                    <h5>Button</h5>

                    <input type="submit" value="Button">
                </div>

                <div>
                    <h5>Select</h5>

                    <select name="pets" id="pet-select">
                        <option>--Please choose an option--</option>
                        <option value="dog">Dog</option>
                        <option value="cat">Cat</option>
                        <option value="hamster">Hamster</option>
                        <option value="parrot">Parrot</option>
                        <option value="spider">Spider</option>
                        <option value="goldfish">Goldfish</option>
                    </select>
                </div>

                <div>
                    <h5>Text Area</h5>

                    <textarea placeholder="Textarea" rows="6"></textarea>
                </div>

            </container>

        </form>



        <script type="module">
            import "./form.js"
        </script>

    </body>

</html>
